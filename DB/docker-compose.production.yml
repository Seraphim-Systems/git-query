version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: gitquery-mongodb
    environment: {MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER}", MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}", MONGO_INITDB_DATABASE: "${MONGO_DB:-gitquery}"}
    volumes: ["mongodb-data:/data/db", "mongodb-config:/data/configdb", "./mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro"]
    networks: ["gitquery-db-network"]
    restart: unless-stopped
    command: mongod --auth --bind_ip_all
  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: gitquery-cosmos-db
    environment: {AZURE_COSMOS_EMULATOR_PARTITION_COUNT: "${COSMOS_PARTITION_COUNT:-10}", AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true", AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: "0.0.0.0"}
    volumes: ["cosmos-data:/data/db", "./cosmos/cosmos-init.js:/docker-entrypoint-initdb.d/cosmos-init.js:ro"]
    networks: ["gitquery-db-network"]
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: gitquery-qdrant
    environment: {QDRANT__SERVICE__GRPC_PORT: "6334", QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}", QDRANT__LOG_LEVEL: "${QDRANT_LOG_LEVEL:-INFO}"}
    volumes: ["qdrant-storage:/qdrant/storage", "qdrant-snapshots:/qdrant/snapshots"]
    networks: ["gitquery-db-network"]
    restart: unless-stopped
  qdrant-init:
    build: {context: ., dockerfile: ./qdrant/Dockerfile.qdrant-init}
    container_name: gitquery-qdrant-init
    depends_on: {qdrant: {condition: service_healthy}}
    environment: {QDRANT_HOST: qdrant, QDRANT_PORT: "6333", QDRANT_API_KEY: "${QDRANT_API_KEY}"}
    networks: ["gitquery-db-network"]
    restart: "no"
volumes:
  mongodb-data: {name: gitquery-mongodb-data}
  mongodb-config: {name: gitquery-mongodb-config}
  cosmos-data: {name: gitquery-cosmos-data}
  qdrant-storage: {name: gitquery-qdrant-storage}
  qdrant-snapshots: {name: gitquery-qdrant-snapshots}
networks:
  gitquery-db-network: {name: gitquery-db-network, driver: bridge, internal: false}
