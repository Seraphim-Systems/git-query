version: '3.8'

services:
  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: gitquery-cosmos-db
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: ${COSMOS_PARTITION_COUNT:-10}
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: ${COSMOS_IP:-127.0.0.1}
      AZURE_COSMOS_EMULATOR_KEY: ${COSMOS_EMULATOR_KEY:-C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==}
    ports:
      - "${COSMOS_PORT:-8081}:8081"
      - "10250-10255:10250-10255"
    volumes:
      - cosmos-data:/data/db
      - ./cosmos/cosmos-init.js:/docker-entrypoint-initdb.d/cosmos-init.js:ro
    networks:
      - db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8081/_explorer/index.html"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G

volumes:
  cosmos-data:
    name: gitquery-cosmos-data

networks:
  db-network:
    name: gitquery-db-network
    driver: bridge
    external: true
