version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: gitquery-mongodb
    environment: {MONGO_INITDB_ROOT_USERNAME: '${MONGO_USER:-admin}', MONGO_INITDB_ROOT_PASSWORD: '${MONGO_PASSWORD:-mongopass}', MONGO_INITDB_DATABASE: '${MONGO_DB:-gitquery}'}
    volumes: ['mongodb-data:/data/db', 'mongodb-config:/data/configdb', './mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro']
    networks: ['db-network']
    restart: unless-stopped
    command: mongod --auth
volumes:
  mongodb-data: {name: gitquery-mongodb-data}
  mongodb-config: {name: gitquery-mongodb-config}
networks:
  db-network: {name: gitquery-db-network, driver: bridge}
