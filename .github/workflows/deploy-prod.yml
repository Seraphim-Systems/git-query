name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create .env file from secrets
        run: |
          cat > .env <<EOF
          # Service versions from repository variables
          APP_VERSION=${{ vars.APP_VERSION || 'latest' }}
          CHAT_AGENT_VERSION=${{ vars.CHAT_AGENT_VERSION || 'latest' }}
          RECOMMENDER_VERSION=${{ vars.RECOMMENDER_VERSION || 'latest' }}
          NGINX_VERSION=${{ vars.NGINX_VERSION || 'latest' }}
          DB_VERSION=${{ vars.DB_VERSION || 'latest' }}
          
          # Secrets
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          API_SECRET=${{ secrets.API_SECRET }}
          EOF

      - name: Build and push images
        run: |
          cd deploy
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml build
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml push

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/git-query
            git pull origin main
            docker-compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml pull
            docker-compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml up -d
            docker system prune -af

      - name: Clean up
        if: always()
        run: rm -f .env
