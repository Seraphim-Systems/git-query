name: Tag and Version

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to version'
        required: true
        type: choice
        options:
          - app
          - chat-agent
          - recommender
          - nginx
          - db
          - all
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  version:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${{ inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Update repository variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SERVICE=${{ inputs.service || 'all' }}
          
          if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "app" ]; then
            gh variable set APP_VERSION --body "$VERSION"
            echo "Set APP_VERSION=$VERSION"
          fi
          
          if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "chat-agent" ]; then
            gh variable set CHAT_AGENT_VERSION --body "$VERSION"
            echo "Set CHAT_AGENT_VERSION=$VERSION"
          fi
          
          if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "recommender" ]; then
            gh variable set RECOMMENDER_VERSION --body "$VERSION"
            echo "Set RECOMMENDER_VERSION=$VERSION"
          fi
          
          if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "nginx" ]; then
            gh variable set NGINX_VERSION --body "$VERSION"
            echo "Set NGINX_VERSION=$VERSION"
          fi
          
          if [ "$SERVICE" == "all" ] || [ "$SERVICE" == "db" ]; then
            gh variable set DB_VERSION --body "$VERSION"
            echo "Set DB_VERSION=$VERSION"
          fi
      
      - name: Summary
        run: |
          echo "### Version Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Service: \`${{ inputs.service || 'all' }}\`" >> $GITHUB_STEP_SUMMARY
