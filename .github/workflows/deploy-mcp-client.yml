name: Deploy MCP + Client

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 1. Setup — clone / pull repo on server
  # ─────────────────────────────────────────────
  setup:
    name: Setup Repository
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or Update Repository
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -e

          REPO_PATH="/home/${{ secrets.INFRA_HETZNER_USER }}/git-query"

          if [ -d "$REPO_PATH" ]; then
            if [ -d "$REPO_PATH/.git" ]; then
              echo "✅ Valid git repository found"
              cd "$REPO_PATH"
              git fetch origin
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            else
              echo "⚠️  Directory exists but is not a git repository. Removing and re-cloning..."
              rm -rf "$REPO_PATH"
              git clone https://github.com/Seraphim-Systems/git-query.git "$REPO_PATH"
              cd "$REPO_PATH"
              git checkout ${{ github.ref_name }}
            fi
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Seraphim-Systems/git-query.git "$REPO_PATH"
            cd "$REPO_PATH"
            git checkout ${{ github.ref_name }}
          fi

          echo "✅ Repository ready at $REPO_PATH"
          ENDSSH

  # ─────────────────────────────────────────────
  # 2. Configure — write .env on server
  # ─────────────────────────────────────────────
  configure:
    name: Configure Environment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Environment File
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -e

          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query

          cat > .env << EOF
          DB_MONGODB_USER=${{ secrets.DB_MONGODB_USER }}
          DB_MONGODB_PASSWORD=${{ secrets.DB_MONGODB_PASSWORD }}
          DB_MONGODB_DATABASE=${{ secrets.DB_MONGODB_DATABASE }}
          DB_REDIS_PASSWORD=${{ secrets.DB_REDIS_PASSWORD }}
          DB_QDRANT_API_KEY=${{ secrets.DB_QDRANT_API_KEY }}
          APIKEY_MCP=${{ secrets.APIKEY_MCP }}
          APIKEY_MONGODB=${{ secrets.APIKEY_MONGODB }}
          APIKEY_QDRANT=${{ secrets.APIKEY_QDRANT }}
          APIKEY_REDIS=${{ secrets.APIKEY_REDIS }}
          APP_OPENAI_API_KEY=${{ secrets.APP_OPENAI_API_KEY }}
          APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
          APP_SESSION_SECRET=${{ secrets.APP_SESSION_SECRET }}
          SVC_LOG_LEVEL=${{ secrets.SVC_LOG_LEVEL }}
          EOF

          # Copy .env to docker directory where compose is run
          cp .env infrastructure/docker/.env

          echo "✅ Environment configured"
          ENDSSH

  # ─────────────────────────────────────────────
  # 3a. Deploy MCP
  # ─────────────────────────────────────────────
  deploy-mcp:
    name: Deploy MCP Server
    runs-on: ubuntu-latest
    needs: configure
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy and Verify MCP Server
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -e

          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker

          echo "🚀 Deploying MCP Server..."
          # docker-compose v1.29 has a bug with newer BuildKit images (missing ContainerConfig).
          # Removing the container before up forces a clean create instead of recreate, bypassing the bug.
          echo "Removing any existing MCP containers..."
          docker ps -aq --filter "name=git-query-mcp" | xargs -r docker rm -f || true
          docker-compose -f docker-compose.base.yml -f docker-compose.mcp.yml up -d --build

          echo ""
          echo "🔍 Waiting for MCP to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' git-query-mcp 2>/dev/null || echo "missing")
            echo "  attempt $i/12 — status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ MCP Server is healthy"
              break
            fi
            sleep 5
          done

          if [ "$STATUS" != "healthy" ]; then
            echo "❌ MCP Server did not become healthy in time"
            docker logs git-query-mcp --tail 30
            exit 1
          fi

          echo ""
          echo "📦 All running containers:"
          docker ps --filter "name=git-query"
          ENDSSH

  # ─────────────────────────────────────────────
  # 3b. Deploy Client
  # ─────────────────────────────────────────────
  deploy-client:
    name: Deploy Client
    runs-on: ubuntu-latest
    needs: deploy-mcp
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Build and Verify Client
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -e

          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query

          echo "🚀 Building Client image..."

          # Remove old container if present
          docker rm -f git-query-client 2>/dev/null || true

          # Build with an explicit tag so we can reference it in the smoke test
          docker build --no-cache -t git-query-client:latest -f infrastructure/docker/Dockerfile.client .

          echo ""
          echo "🔍 Verifying client can reach MCP server..."
          docker run --rm \
            --network git-query-web-network \
            git-query-client:latest \
            python -c "import urllib.request,sys; resp=urllib.request.urlopen('http://git-query-mcp:8090/health',timeout=10); print('MCP health:', resp.read().decode()); sys.exit(0 if resp.status==200 else 1)"

          echo "✅ Client successfully connected to MCP"
          echo ""
          echo "📦 All git-query containers:"
          docker ps --filter "name=git-query"
          ENDSSH

  # ─────────────────────────────────────────────
  # 4. Verify — health checks and summary
  # ─────────────────────────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-client
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Verify Services
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -e

          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker

          echo "══════════════════════════════════════"
          echo "  DEPLOYMENT SUMMARY"
          echo "══════════════════════════════════════"

          echo ""
          echo "🔍 MCP Server:"
          if docker ps | grep -q "git-query-mcp"; then
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' git-query-mcp 2>/dev/null || echo "unknown")
            echo "  ✅ Running — health: $STATUS"
            docker logs git-query-mcp --tail 10
          else
            echo "  ⚠️  Not running"
          fi

          echo ""
          echo "🔍 Client image:"
          if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "client"; then
            docker images --filter "reference=*client*" --format "  ✅ {{.Repository}}:{{.Tag}} — built {{.CreatedAt}} ({{.Size}})"
          else
            echo "  ⚠️  Image not found"
          fi

          echo ""
          echo "📦 All git-query containers:"
          docker ps --filter "name=git-query" --format "  {{.Names}}\t{{.Status}}"

          echo ""
          echo "💡 To start the interactive client:"
          echo "   docker run --rm -it --network git-query-web-network -e MCP_SERVER_URL=http://git-query-mcp:8090 --env-file /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/.env git-query-client:latest"

          echo ""
          echo "✅ Verification complete"
          ENDSSH
