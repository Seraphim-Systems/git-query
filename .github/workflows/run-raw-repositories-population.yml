name: Run Raw Repositories Population

# Single Responsibility: run raw repositories population script on server
# Triggered: Manual workflow dispatch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run from on server"
        required: false
        type: string
        default: "dev"
      dataset:
        description: "Kaggle dataset slug"
        required: false
        type: string
        default: "pelmers/github-repository-metadata-with-5-stars"
      dataset_file:
        description: "Dataset JSON filename"
        required: false
        type: string
        default: "repo_metadata.json"
      batch_size:
        description: "Batch size"
        required: false
        type: string
        default: "200"
      resume:
        description: "Resume from checkpoint"
        required: false
        type: boolean
        default: true
      reset_checkpoint:
        description: "Reset checkpoint before run"
        required: false
        type: boolean
        default: false

jobs:
  run-population:
    name: Run population on server
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run population in Docker on server
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -euo pipefail
          REPO_PATH="/home/${{ secrets.INFRA_HETZNER_USER }}/git-query"
          PROCESSING_IMAGE="git-query-processing:raw-population"
          POP_CONTAINER="git-query-raw-population-job"
          PRECHECK_CONTAINER="git-query-raw-kaggle-precheck"
          CHECKPOINT_FILE=".checkpoints/raw_repositories_population.server.json"
          LOG_FILE="logs/raw_repositories_population.log"
          POP_ENV_FILE=".runtime/raw-population.env"
          POP_COMPOSE_FILE=".runtime/docker-compose.raw-population.yml"
          MONGO_WAS_RUNNING=0

          cleanup() {
            if [ "$MONGO_WAS_RUNNING" -eq 0 ]; then
              echo "Stopping Mongo container started by this workflow (data remains on named volume)."
              docker compose \
                -f infrastructure/docker/docker-compose.base.yml \
                -f infrastructure/docker/docker-compose.databases.yml \
                stop mongodb || true
            fi
          }
          trap cleanup EXIT

          if [ -d "$REPO_PATH/.git" ]; then
            cd "$REPO_PATH"
            git fetch origin
            git reset --hard origin/${{ github.event.inputs.branch }}
          else
            git clone https://github.com/Seraphim-Systems/git-query.git "$REPO_PATH"
            cd "$REPO_PATH"
            git checkout ${{ github.event.inputs.branch }}
          fi

          mkdir -p "$REPO_PATH/logs" "$REPO_PATH/.checkpoints"
          mkdir -p "$REPO_PATH/.runtime"

          if [ -z "${{ secrets.KAGGLE_USERNAME }}" ] || [ -z "${{ secrets.KAGGLE_KEY }}" ]; then
            echo "Missing Kaggle secrets. Set KAGGLE_USERNAME and KAGGLE_KEY in repository secrets."
            exit 1
          fi

          mkdir -p "$REPO_PATH/.kaggle"
          cat > "$REPO_PATH/.kaggle/kaggle.json" << EOF
          {
            "username": "${{ secrets.KAGGLE_USERNAME }}",
            "key": "${{ secrets.KAGGLE_KEY }}"
          }
          EOF
          chmod 600 "$REPO_PATH/.kaggle/kaggle.json"

          RESUME_FLAG=""
          if [ "${{ github.event.inputs.resume }}" = "true" ]; then
            RESUME_FLAG="--resume"
          fi

          RESET_FLAG=""
          if [ "${{ github.event.inputs.reset_checkpoint }}" = "true" ]; then
            RESET_FLAG="--reset-checkpoint"
          fi

          if docker ps --format '{{.Names}}' | grep -Fxq git-query-mongodb; then
            MONGO_WAS_RUNNING=1
            echo "Mongo container already running; reusing existing volume-backed DB."
          else
            echo "Starting Mongo container for this run..."
            docker compose \
              -f infrastructure/docker/docker-compose.base.yml \
              -f infrastructure/docker/docker-compose.databases.yml \
              up -d mongodb
          fi

          echo "Building processing image..."
          docker build -f infrastructure/docker/Dockerfile.processing -t "$PROCESSING_IMAGE" .

          cat > "$REPO_PATH/$POP_ENV_FILE" << EOF
          MONGODB_URL=mongodb://${{ secrets.DB_MONGODB_USER || 'admin' }}:${{ secrets.DB_MONGODB_PASSWORD || 'mongopass' }}@git-query-mongodb:27017/gitquery?authSource=admin
          MONGODB_DB=gitquery
          KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}
          KAGGLE_CONFIG_DIR=/root/.kaggle
          PYTHONPATH=/repo
          RESUME_FLAG=$RESUME_FLAG
          RESET_FLAG=$RESET_FLAG
          EOF
          chmod 600 "$REPO_PATH/$POP_ENV_FILE"

          cat > "$REPO_PATH/$POP_COMPOSE_FILE" << 'EOF'
          services:
            raw-kaggle-precheck:
              image: git-query-processing:raw-population
              container_name: git-query-raw-kaggle-precheck
              env_file:
                - raw-population.env
              volumes:
                - ../:/repo
                - ../.kaggle:/root/.kaggle:ro
              command:
                - python
                - -c
                - |
                  import sys, kagglehub
                  public_ds = "uciml/iris"
                  target_ds = "${DATASET}"
                  try:
                      kagglehub.dataset_download(public_ds)
                      print(f"Kaggle auth check OK on public dataset: {public_ds}")
                  except Exception as e:
                      print("Kaggle auth check FAILED on public dataset. Credentials are likely invalid/mismatched.")
                      print(e)
                      sys.exit(2)
                  try:
                      kagglehub.dataset_download(target_ds)
                      print(f"Kaggle target dataset access OK: {target_ds}")
                  except Exception as e:
                      print("Kaggle target dataset access FAILED. Account likely lacks dataset permission/consent acceptance.")
                      print(e)
                      sys.exit(3)

            raw-population-job:
              image: git-query-processing:raw-population
              container_name: git-query-raw-population-job
              env_file:
                - raw-population.env
              networks:
                - internal-network
              volumes:
                - ../:/repo
                - ../.kaggle:/root/.kaggle:ro
              command:
                - bash
                - -lc
                - |
                  set -euo pipefail
                  python /repo/src/processing/scripts/raw_repositories_population.py \
                    --dataset "${DATASET}" \
                    --file "${DATASET_FILE}" \
                    --collection raw_repositories \
                    --target mongodb \
                    --batch-size "${BATCH_SIZE}" \
                    --checkpoint-file "${CHECKPOINT_FILE}" \
                    ${RESUME_FLAG} \
                    ${RESET_FLAG}

          networks:
            internal-network:
              external: true
              name: git-query-internal-network
          EOF

          export DATASET="${{ github.event.inputs.dataset }}"
          export DATASET_FILE="${{ github.event.inputs.dataset_file }}"
          export BATCH_SIZE="${{ github.event.inputs.batch_size }}"
          export CHECKPOINT_FILE="$CHECKPOINT_FILE"
          export RESUME_FLAG="$RESUME_FLAG"
          export RESET_FLAG="$RESET_FLAG"

          docker rm -f "$POP_CONTAINER" "$PRECHECK_CONTAINER" >/dev/null 2>&1 || true

          echo "Kaggle preflight check..."
          docker compose -f "$POP_COMPOSE_FILE" run --rm raw-kaggle-precheck

          echo "Running raw population job in container..."
          docker compose -f "$POP_COMPOSE_FILE" run --rm raw-population-job 2>&1 | tee "$REPO_PATH/$LOG_FILE"

          echo "Population job finished."

          echo "Checkpoint summary:"
          cat "$REPO_PATH/$CHECKPOINT_FILE" || true

          echo "Current raw_repositories count:"
          docker exec git-query-mongodb mongosh \
            "mongodb://${{ secrets.DB_MONGODB_USER || 'admin' }}:${{ secrets.DB_MONGODB_PASSWORD || 'mongopass' }}@localhost:27017/gitquery?authSource=admin" \
            --quiet --eval 'db.raw_repositories.countDocuments({})' || true

          ENDSSH

      - name: Show checkpoint state
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          REPO_PATH="/home/${{ secrets.INFRA_HETZNER_USER }}/git-query"
          if [ -f "$REPO_PATH/.checkpoints/raw_repositories_population.server.json" ]; then
            cat "$REPO_PATH/.checkpoints/raw_repositories_population.server.json"
          else
            echo "No checkpoint file yet"
          fi
          if [ -f "$REPO_PATH/logs/raw_repositories_population.log" ]; then
            tail -n 30 "$REPO_PATH/logs/raw_repositories_population.log"
          else
            echo "No log file yet"
          fi
          ENDSSH
