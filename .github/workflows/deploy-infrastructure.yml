name: Deploy Infrastructure (Databases)

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Which services to deploy'
        required: true
        type: choice
        options:
          - all
          - mongodb
          - cosmos
          - qdrant
          - redis
        default: 'all'

jobs:
  setup:
    name: Setup Repository
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or Update Repository
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << ENDSSH
          set -e
          
          REPO_PATH="/home/${{ secrets.HETZNER_USER }}/git-query"
          
          # Check if directory exists and is a valid git repo
          if [ -d "\$REPO_PATH" ]; then
            if [ -d "\$REPO_PATH/.git" ]; then
              echo "✅ Valid git repository found"
              cd "\$REPO_PATH"
              git fetch origin
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            else
              echo "⚠️  Directory exists but is not a git repository. Removing and re-cloning..."
              rm -rf "\$REPO_PATH"
              git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
              cd "\$REPO_PATH"
              git checkout ${{ github.ref_name }}
            fi
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
            cd "\$REPO_PATH"
            git checkout ${{ github.ref_name }}
          fi
          
          echo "✅ Repository ready at \$REPO_PATH"
          ENDSSH

  configure:
    name: Configure Environment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Environment File
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.HETZNER_USER }}/git-query
          
          cat > .env << EOF
          MONGO_USER=${{ secrets.MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          MONGO_DB=${{ secrets.MONGO_DB }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          COSMOS_PARTITION_COUNT=${{ secrets.COSMOS_PARTITION_COUNT }}
          QDRANT_LOG_LEVEL=${{ secrets.QDRANT_LOG_LEVEL }}
          DATA_INGESTION_API_KEY=${{ secrets.DATA_INGESTION_API_KEY }}
          SERVER_NAME=${{ secrets.SERVER_NAME }}
          EOF
          
          echo "✅ Environment configured"
          ENDSSH

  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: configure
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Infrastructure Services
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.HETZNER_USER }}/git-query/infrastructure/docker
          
          if [ "${{ github.event.inputs.services }}" == "all" ]; then
            echo "🚀 Deploying all infrastructure services..."
            docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d
          else
            echo "🚀 Deploying ${{ github.event.inputs.services }}..."
            docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d ${{ github.event.inputs.services }}
            
            if [ "${{ github.event.inputs.services }}" == "qdrant" ]; then
              docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d qdrant-init
            fi
          fi
          
          echo ""
          echo "📦 Running containers:"
          docker ps --filter "name=git-query"
          ENDSSH

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Health Check Services
        run: |
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.HETZNER_USER }}/git-query/infrastructure/docker
          
          echo "🔍 Checking service health..."
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "mongodb" ]; then
            docker exec git-query-mongodb mongosh --quiet --eval "db.adminCommand('ping')" && echo "✅ MongoDB healthy" || echo "❌ MongoDB failed"
          fi
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "redis" ]; then
            docker exec git-query-redis redis-cli ping && echo "✅ Redis healthy" || echo "❌ Redis failed"
          fi
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "qdrant" ]; then
            docker exec git-query-qdrant curl -f http://localhost:6333/health && echo "✅ Qdrant healthy" || echo "❌ Qdrant failed"
          fi
          
          echo ""
          echo "✅ Deployment verification complete"
          ENDSSH
