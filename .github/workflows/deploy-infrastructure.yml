name: Deploy Infrastructure (Databases)

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Which services to deploy'
        required: true
        type: choice
        options:
          - all
          - mongodb
          - cosmos
          - qdrant
          - redis
        default: 'all'

jobs:
  setup:
    name: Setup Repository
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or Update Repository
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          REPO_PATH="/home/${{ secrets.INFRA_HETZNER_USER }}/git-query"
          
          # Check if directory exists and is a valid git repo
          if [ -d "\$REPO_PATH" ]; then
            if [ -d "\$REPO_PATH/.git" ]; then
              echo "✅ Valid git repository found"
              cd "\$REPO_PATH"
              git fetch origin
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            else
              echo "⚠️  Directory exists but is not a git repository. Removing and re-cloning..."
              rm -rf "\$REPO_PATH"
              git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
              cd "\$REPO_PATH"
              git checkout ${{ github.ref_name }}
            fi
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
            cd "\$REPO_PATH"
            git checkout ${{ github.ref_name }}
          fi
          
          echo "✅ Repository ready at \$REPO_PATH"
          ENDSSH

  configure:
    name: Configure Environment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Environment File
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query
          
          cat > .env << EOF
          DB_MONGODB_USER=${{ secrets.DB_MONGODB_USER }}
          DB_MONGODB_PASSWORD=${{ secrets.DB_MONGODB_PASSWORD }}
          DB_MONGODB_DATABASE=${{ secrets.DB_MONGODB_DATABASE }}
          DB_REDIS_PASSWORD=${{ secrets.DB_REDIS_PASSWORD }}
          DB_COSMOS_PARTITION_COUNT=${{ secrets.DB_COSMOS_PARTITION_COUNT }}
          SVC_QDRANT_LOG_LEVEL=${{ secrets.SVC_QDRANT_LOG_LEVEL }}
          APP_SESSION_SECRET=${{ secrets.APP_SESSION_SECRET }}
          APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
          DB_QDRANT_API_KEY=${{ secrets.DB_QDRANT_API_KEY }}
          APIKEY_MONGODB=${{ secrets.APIKEY_MONGODB }}
          APIKEY_REDIS=${{ secrets.APIKEY_REDIS }}
          APIKEY_QDRANT=${{ secrets.APIKEY_QDRANT }}
          # Cosmos DB configuration: accept APIKEY_COSMODB or COSMOS_DB_KEY
          APIKEY_COSMODB=${{ secrets.APIKEY_COSMODB }}
          SVC_NGINX_SERVER_NAME=${{ secrets.SVC_NGINX_SERVER_NAME }}
          SVC_LOG_LEVEL=${{ secrets.SVC_LOG_LEVEL }}
          EOF
          
          # Copy .env to docker directory where compose is run
          cp .env infrastructure/docker/.env
          
          echo "✅ Environment configured"
          cat .env
          ENDSSH

  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: configure
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Infrastructure Services
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker
          
          # Clean up any corrupted containers and remove volumes so DBs are recreated
          echo "🧹 Cleaning up existing containers and volumes..."
          docker-compose -f docker-compose.base.yml -f docker-compose.db.yml down -v --remove-orphans || true
          
          if [ "${{ github.event.inputs.services }}" == "all" ]; then
            echo "🚀 Deploying all infrastructure services..."
            
            # Start databases first
            echo "📦 Starting databases..."
            docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d --build mongodb redis qdrant cosmos-db
            
            # Wait for databases to initialize
            echo "⏳ Waiting 30 seconds for databases to initialize..."
            sleep 30
            
            # Check final status
            docker ps --filter "name=git-query" --format "table {{.Names}}\t{{.Status}}"
            
            # Start dependent services
            echo "🚀 Starting init and gateway services..."
            # db-query-api removed; the Gateway serves DB endpoints. Start init and gateway.
            docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d --build qdrant-init gateway
          else
            echo "🚀 Deploying ${{ github.event.inputs.services }}..."
            docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d --build ${{ github.event.inputs.services }}
            
            if [ "${{ github.event.inputs.services }}" == "qdrant" ]; then
              sleep 15
              docker-compose -f docker-compose.base.yml -f docker-compose.db.yml up -d qdrant-init
            fi
          fi
          
          echo ""
          echo "📦 Running containers:"
          docker ps --filter "name=git-query"
          ENDSSH

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Health Check Services
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker
          
          echo "🔍 Checking service health..."
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "mongodb" ]; then
            docker exec git-query-mongodb mongosh --quiet --eval "db.adminCommand('ping')" && echo "✅ MongoDB healthy" || echo "❌ MongoDB failed"
          fi
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "redis" ]; then
            docker exec git-query-redis redis-cli ping && echo "✅ Redis healthy" || echo "❌ Redis failed"
          fi
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "qdrant" ]; then
            docker exec git-query-qdrant wget --no-verbose --tries=1 --spider http://localhost:6333/health && echo "✅ Qdrant healthy" || echo "❌ Qdrant failed"
          fi
          
          echo ""
          echo "✅ Deployment verification complete"
          ENDSSH
