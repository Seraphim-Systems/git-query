name: Deploy Web Interface

# Single Responsibility: Deploy only the web interface
# Triggered: Manual workflow dispatch
# Services: Web (with database dependencies)

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.web.yml"
      services: "web"
      branch: ${{ github.ref_name }}
      # Port 8080 is not exposed to the host in production; exec into the container.
      health_check_command: "docker exec git-query-web curl -f http://localhost:8080/health"
    secrets: inherit
