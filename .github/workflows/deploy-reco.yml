name: Deploy Recommendation Engine

# Single Responsibility: Deploy only the recommender service
# Triggered: Manual workflow dispatch
# Services: Recommender (with database dependencies)

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.app.yml"
      services: "recommender"
      health_check_url: "http://localhost:8095/health"
    secrets: inherit
