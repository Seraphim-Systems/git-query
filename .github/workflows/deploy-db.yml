name: Deploy Databases to Hetzner

# This workflow deploys database services to Hetzner server
# Triggered by: Manual workflow dispatch with options to select which databases to deploy
# Deploys: Selected database services from infrastructure/docker/docker-compose.db.yml
#   - MongoDB, Cosmos DB, Qdrant, Redis (based on inputs)
#   - db-query-api (always deployed if any database is selected)
#   - nginx (always deployed if any database is selected)
# Note: This is different from deploy-prod.yml which deploys the entire application stack

on:
  workflow_dispatch:
    inputs:
      deploy_mongodb:
        description: 'Deploy MongoDB'
        required: true
        default: true
        type: boolean
      deploy_cosmos:
        description: 'Deploy Cosmos DB'
        required: true
        default: true
        type: boolean
      deploy_qdrant:
        description: 'Deploy Qdrant'
        required: true
        default: true
        type: boolean
      deploy_redis:
        description: 'Deploy Redis'
        required: true
        default: true
        type: boolean

jobs:
  deploy-databases:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose v2
        run: |
          # Install Docker Compose v2 (standalone)
          sudo curl -SL https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Create deployment .env file
        run: |
          cat > .env.deploy <<EOF
          # MongoDB Configuration
          MONGO_USER=${{ secrets.MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
          MONGO_DB=gitquery
          
          # Cosmos DB Configuration
          COSMOS_PARTITION_COUNT=10
          
          # Qdrant Configuration
          QDRANT_LOG_LEVEL=INFO
          
          # Redis Configuration
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          
          # Nginx Configuration
          NGINX_PORT=80
          SERVER_NAME=${{ secrets.SERVER_NAME }}
          
          # Data Ingestion API Key
          DATA_INGESTION_API_KEY=${{ secrets.DATA_INGESTION_API_KEY }}
          EOF

      - name: Copy files to Hetzner server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "infrastructure/docker/docker-compose.db.yml,infrastructure/docker/Dockerfile.*,src/storage,web/nginx-db.conf.template,.env.deploy"
          target: "/home/${{ secrets.HETZNER_USER }}/git-query"
          strip_components: 0

      - name: Deploy databases on Hetzner
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.HETZNER_USER }}/git-query
            
            # Move .env file
            mv .env.deploy .env
            
            # Stop existing services
            docker-compose -f infrastructure/docker/docker-compose.db.yml down
            
            # Build services
            SERVICES=""
            if [ "${{ inputs.deploy_mongodb }}" == "true" ]; then
              SERVICES="$SERVICES mongodb"
            fi
            if [ "${{ inputs.deploy_cosmos }}" == "true" ]; then
              SERVICES="$SERVICES cosmos-db"
            fi
            if [ "${{ inputs.deploy_qdrant }}" == "true" ]; then
              SERVICES="$SERVICES qdrant qdrant-init"
            fi
            if [ "${{ inputs.deploy_redis }}" == "true" ]; then
              SERVICES="$SERVICES redis"
            fi
            
            # Always include db-query-api and nginx when deploying databases
            # The API and nginx services require at least one database to be useful
            if [ -n "$SERVICES" ]; then
              SERVICES="$SERVICES db-query-api nginx"
            else
              echo "ERROR: No databases selected for deployment."
              echo "Please select at least one database service to deploy."
              exit 1
            fi
            
            # Start selected services
            docker-compose -f infrastructure/docker/docker-compose.db.yml up -d $SERVICES
            
            # Wait for services to be healthy
            sleep 10
            
            # Show status
            docker-compose -f infrastructure/docker/docker-compose.db.yml ps
            
            # Clean up old images
            docker system prune -af --volumes=false

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.HETZNER_USER }}/git-query
            echo "Checking service health..."
            docker-compose -f infrastructure/docker/docker-compose.db.yml ps
            
            # Test endpoint
            curl -f http://localhost/health || exit 1
            echo "Deployment successful!"

      - name: Clean up local secrets
        if: always()
        run: rm -f .env.deploy