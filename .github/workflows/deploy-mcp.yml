name: Deploy MCP Server

# Single Responsibility: Deploy only the MCP (Model Context Protocol) server
# Triggered: Manual workflow dispatch
# Services: MCP Server (with database dependencies)

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.app.yml"
      services: "mcp-server"
      health_check_url: "http://localhost:8090/health"
    secrets: inherit
