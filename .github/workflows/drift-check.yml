name: Drift Monitoring

permissions:
  contents: read
  issues: write
  actions: write

on:
  # Run weekly on Sundays at 3 AM UTC
  schedule:
    - cron: '0 3 * * 0'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of drift check to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - data
          - embedding
          - prediction

jobs:
  build-drift-monitor:
    name: Smoke Test Drift Monitor Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build drift monitor image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.drift-monitor \
            -t git-query-drift-monitor:latest \
            .

      - name: Smoke test — image starts without error
        run: |
          # Exit 2 = missing env vars (expected); anything else = crash
          docker run --rm git-query-drift-monitor:latest || [ $? -eq 2 ]

  drift-check:
    name: Run Drift Detection
    runs-on: ubuntu-latest
    needs: build-drift-monitor
    # Only runs on schedule or manual dispatch — not on every PR
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      drift_detected: ${{ steps.run-drift.outputs.drift_detected }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Configure drift environment on server
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query

          cat > .env.drift << EOF
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          APIKEY_MONGODB=${{ secrets.APIKEY_MONGODB }}
          QDRANT_URL=${{ secrets.QDRANT_URL }}
          APIKEY_QDRANT=${{ secrets.DB_QDRANT_API_KEY }}
          REFERENCE_SCORES_PATH=/app/models/metadata/reference_scores.npy
          MODELS_DIR=/app/models
          EOF

          echo "Drift environment configured"
          ENDSSH

      - name: Run drift check on server
        id: run-drift
        run: |
          RESULT=$(ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << 'ENDSSH'
          set -e
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query

          git pull origin ${{ github.ref_name }}

          # Load drift-specific env vars
          set -a && source .env.drift && set +a

          cd infrastructure/docker

          echo "Building drift monitor image..."
          docker-compose -f docker-compose.base.yml -f docker-compose.monitoring.yml \
            build drift-monitor

          echo "Running drift check..."
          docker-compose -f docker-compose.base.yml -f docker-compose.monitoring.yml \
            run --rm drift-monitor
          EXIT=$?

          if [ "$EXIT" = "1" ]; then
            echo "drift_detected=true"
          else
            echo "drift_detected=false"
          fi
          ENDSSH
          )

          DRIFT=$(echo "$RESULT" | grep "drift_detected=" | cut -d= -f2)
          echo "drift_detected=${DRIFT:-false}" >> $GITHUB_OUTPUT

          if [ "${DRIFT}" = "true" ]; then
            echo "::warning::Drift detected in recommendation data"
          fi

      - name: Download drift reports from server
        if: always()
        run: |
          # Copy drift reports back to Actions runner for artifact upload
          scp -r \
            ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }}:/tmp/drift_reports_export \
            ./drift_reports 2>/dev/null || true
        continue-on-error: true

      - name: Upload drift reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-reports-${{ github.run_id }}
          path: drift_reports/
          if-no-files-found: ignore

  trigger-retrain-on-drift:
    name: Trigger Retraining on Drift
    runs-on: ubuntu-latest
    needs: drift-check
    if: needs.drift-check.outputs.drift_detected == 'true'
    steps:
      - name: Dispatch retraining pipeline
        run: |
          gh workflow run scheduled-retrain.yml \
            --ref ${{ github.ref_name }} \
            --field force_retrain=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  notify-on-drift:
    name: Notify on Drift Detection
    runs-on: ubuntu-latest
    needs: drift-check
    if: needs.drift-check.outputs.drift_detected == 'true'
    steps:
      - name: Create Issue on Drift
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Model/Data Drift Detected';
            const body = `
            ## Drift Detection Alert

            The scheduled drift check has detected potential drift in the recommendation system.

            **Run:** ${context.runId}
            **Triggered:** ${new Date().toISOString()}

            ### Checks Run
            See the drift reports artifact attached to the workflow run for details on which
            checks (data drift, embedding drift, CTR drift) triggered the alert.

            ### Recommended Actions:
            1. Review drift reports uploaded as workflow artifacts
            2. Check model performance metrics in MLflow
            3. A retraining run has been automatically dispatched

            [View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-alert',
              state: 'open'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift-alert', 'mlops']
              });
            }
