name: Drift Monitoring

permissions:
  contents: read
  issues: write
  actions: write

on:
  # Run weekly on Sundays at 3 AM UTC
  schedule:
    - cron: '0 3 * * 0'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      check_type:
        description: 'Type of drift check to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - data
          - embedding
          - prediction

jobs:
  build-drift-monitor:
    name: Build Drift Monitor Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build drift monitor image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.drift-monitor \
            -t git-query-drift-monitor:latest \
            .

      - name: Smoke test — image starts without error
        run: |
          # Run without data paths to confirm the container starts and
          # exits with code 2 (missing env vars) not a crash/import error.
          docker run --rm \
            git-query-drift-monitor:latest || [ $? -eq 2 ]

  drift-check:
    name: Run Drift Detection
    runs-on: ubuntu-latest
    needs: build-drift-monitor
    # Only runs when real data is available (scheduled or manual trigger
    # with DATA_DIR secret configured). Skipped on regular PRs.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      drift_detected: ${{ steps.run-drift.outputs.drift_detected }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build drift monitor image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile.drift-monitor \
            -t git-query-drift-monitor:latest \
            .

      - name: Run drift check
        id: run-drift
        run: |
          docker run --rm \
            -e REFERENCE_DATA_PATH=/data/reference.parquet \
            -e CURRENT_DATA_PATH=/data/current.parquet \
            -e EVIDENTLY_REPORT_PATH=/app/drift_reports \
            -v ${{ github.workspace }}/drift_reports:/app/drift_reports \
            git-query-drift-monitor:latest || DRIFT_EXIT=$?

          if [ "${DRIFT_EXIT}" = "1" ]; then
            echo "::warning::Drift detected in recommendation data"
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload drift reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-reports-${{ github.run_id }}
          path: drift_reports/
          if-no-files-found: ignore

  trigger-retrain-on-drift:
    name: Trigger Retraining on Drift
    runs-on: ubuntu-latest
    needs: drift-check
    if: needs.drift-check.outputs.drift_detected == 'true'
    steps:
      - name: Dispatch retraining pipeline
        run: |
          gh workflow run scheduled-retrain.yml \
            --ref ${{ github.ref_name }} \
            --field force_retrain=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  notify-on-drift:
    name: Notify on Drift Detection
    runs-on: ubuntu-latest
    needs: drift-check
    if: needs.drift-check.outputs.drift_detected == 'true'
    steps:
      - name: Create Issue on Drift
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Model/Data Drift Detected';
            const body = `
            ## Drift Detection Alert

            The scheduled drift check has detected potential drift in the recommendation system.

            **Run:** ${context.runId}
            **Triggered:** ${new Date().toISOString()}

            ### Recommended Actions:
            1. Review drift reports uploaded as workflow artifacts
            2. Check model performance metrics in MLflow
            3. Consider triggering a retraining run if drift is significant

            [View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift-alert',
              state: 'open'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['drift-alert', 'mlops']
              });
            }
