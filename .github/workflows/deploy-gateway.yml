name: Deploy Gateway

# Single Responsibility: Deploy only the API Gateway service
# Triggered: Manual workflow dispatch
# Services: Gateway (with database dependencies)

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.gateway.yml"
      services: "gateway"
      # Use docker inspect to wait for the gateway's Docker HEALTHCHECK to pass.
      # Port 80 is not exposed to the host in production.
      health_check_command: "timeout 60 sh -c 'until docker inspect -f {{.State.Health.Status}} git-query-gateway 2>/dev/null | grep -qw healthy; do sleep 3; done'"
    secrets: inherit
