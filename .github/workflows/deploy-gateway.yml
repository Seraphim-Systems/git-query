name: Deploy Gateway

# Single Responsibility: Deploy only the API Gateway service
# Triggered: Manual workflow dispatch
# Services: Gateway (with database dependencies)

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.gateway.yml"
      services: "gateway"
      branch: ${{ github.ref_name }}
      # Port 80 is not exposed to the host in production. Verify the container
      # is running via docker inspect.
      health_check_command: "docker inspect -f '{{.State.Running}}' git-query-gateway | grep -q true"
    secrets: inherit
