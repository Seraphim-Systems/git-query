name: Deploy Data Pipelines

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Which services to deploy'
        required: true
        type: choice
        options:
          - all
          - scraper
          - processing
        default: 'all'

jobs:
  setup:
    name: Setup Repository
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or Update Repository
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          REPO_PATH="/home/${{ secrets.INFRA_HETZNER_USER }}/git-query"
          
          # Check if directory exists and is a valid git repo
          if [ -d "\$REPO_PATH" ]; then
            if [ -d "\$REPO_PATH/.git" ]; then
              echo "✅ Valid git repository found"
              cd "\$REPO_PATH"
              git fetch origin
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            else
              echo "⚠️  Directory exists but is not a git repository. Removing and re-cloning..."
              rm -rf "\$REPO_PATH"
              git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
              cd "\$REPO_PATH"
              git checkout ${{ github.ref_name }}
            fi
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
            cd "\$REPO_PATH"
            git checkout ${{ github.ref_name }}
          fi
          
          echo "✅ Repository ready at \$REPO_PATH"
          ENDSSH

  configure:
    name: Configure Environment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Environment File
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query
          
          cat > .env << EOF
          DB_MONGODB_USER=${{ secrets.DB_MONGODB_USER }}
          DB_MONGODB_PASSWORD=${{ secrets.DB_MONGODB_PASSWORD }}
          DB_MONGODB_DATABASE=${{ secrets.DB_MONGODB_DATABASE }}
          DB_REDIS_PASSWORD=${{ secrets.DB_REDIS_PASSWORD }}
          APIKEY_MONGODB=${{ secrets.APIKEY_MONGODB }}
          APIKEY_REDIS=${{ secrets.APIKEY_REDIS }}
          SVC_LOG_LEVEL=${{ secrets.SVC_LOG_LEVEL }}
          SCRAPE_INTERVAL=3600
          MAX_CONCURRENT_JOBS=5
          BATCH_SIZE=100
          EOF
          
          echo "✅ Environment configured"
          ENDSSH

  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: configure
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Check Database Dependencies
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          echo "🔍 Checking database dependencies..."
          if ! docker ps | grep -q "git-query-mongodb"; then
            echo "❌ MongoDB is not running. Please deploy infrastructure first."
            exit 1
          fi
          if ! docker ps | grep -q "git-query-redis"; then
              echo "❌ Redis is not running. Please deploy infrastructure first."
            exit 1
          fi
          
          echo "✅ Database dependencies verified"
          ENDSSH

      - name: Deploy Pipeline Services
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker
          
          if [ "${{ github.event.inputs.services }}" == "all" ]; then
            echo "🚀 Deploying all pipeline services..."
            docker-compose -f docker-compose.base.yml -f docker-compose.pipelines.yml up -d
          else
            echo "🚀 Deploying ${{ github.event.inputs.services }}..."
            docker-compose -f docker-compose.base.yml -f docker-compose.pipelines.yml up -d ${{ github.event.inputs.services }}
          fi
          
          echo ""
          echo "📦 Running containers:"
          docker ps --filter "name=git-query"
          ENDSSH

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Health Check Services
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker
          
          echo "🔍 Checking service health..."
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "scraper" ]; then
            docker logs git-query-scraper --tail 20 && echo "✅ Scraper running" || echo "❌ Scraper failed"
          fi
          
          if [ "${{ github.event.inputs.services }}" == "all" ] || [ "${{ github.event.inputs.services }}" == "processing" ]; then
            docker logs git-query-processing --tail 20 && echo "✅ Processing running" || echo "❌ Processing failed"
          fi
          
          echo ""
          echo "✅ Deployment verification complete"
          ENDSSH
