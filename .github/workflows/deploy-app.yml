name: Deploy Full Stack (Manual)

# Single Responsibility: Deploy full stack manually from selected branch
# Triggered: Manual workflow dispatch
# Services: All services defined in compose files

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.gateway.yml -f docker-compose.app.yml -f docker-compose.web.yml -f docker-compose.training.yml -f docker-compose.prod.yml"
      services: ""
      branch: ${{ github.ref_name }}
      health_check_url: "http://localhost/health"
    secrets: inherit
