name: "Automatic — Pull Request Tests (CI)"

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  changed-files:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      mlops: ${{ steps.changes.outputs.mlops }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            backend:
              - 'src/**'
              - 'tests/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
              - 'setup.cfg'
              - 'ruff.toml'
            mlops:
              - 'src/recommender/**'
              - 'recommender/**'
              - 'src/recommender/**'
              - 'tests/recommender/**'
            infra:
              - '.github/**'
              - 'infrastructure/**'
              - 'Dockerfile*'

  unit-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    needs: changed-files
    if: github.event_name == 'workflow_dispatch' || needs.changed-files.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ci-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ci-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint
        run: |
          ruff check src/recommender/mlops/ tests/mlops/ tests/test_smoke.py --output-format=github
          ruff format src/recommender/mlops/ tests/mlops/ tests/test_smoke.py --check

      - name: Run unit tests
        run: |
          pytest tests/ \
            -m "not integration and not slow" \
            --ignore=tests/test_processing.py \
            --deselect=tests/recommender/test_reranker_service.py::TestLoadActiveModel::test_load_active_model_falls_back_when_path_missing \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: changed-files
    if: github.event_name == 'workflow_dispatch' || needs.changed-files.outputs.mlops == 'true' || needs.changed-files.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/recommender/requirements-mlops.txt

      - name: Run smoke tests
        run: |
          pytest tests/test_smoke.py -v

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke-test]
    if: always()
    steps:
      - name: Check whether any test jobs ran
        run: |
          UNIT_STATUS="${{ needs.unit-tests.result }}"
          SMOKE_STATUS="${{ needs.smoke-test.result }}"

          if [[ "$UNIT_STATUS" == "skipped" && "$SMOKE_STATUS" == "skipped" ]]; then
            echo "No relevant tests changed; skipping CI checks."
            exit 0
          fi

          if [[ "$UNIT_STATUS" != "success" ]] || [[ "$SMOKE_STATUS" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required tests passed!"
