name: Run ML Training

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '10'
      batch_size:
        description: 'Training batch size'
        required: false
        default: '64'
      learning_rate:
        description: 'Learning rate'
        required: false
        default: '0.001'

jobs:
  setup:
    name: Setup Repository
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or Update Repository
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          REPO_PATH="/home/${{ secrets.INFRA_HETZNER_USER }}/git-query"
          
          # Check if directory exists and is a valid git repo
          if [ -d "\$REPO_PATH" ]; then
            if [ -d "\$REPO_PATH/.git" ]; then
              echo "✅ Valid git repository found"
              cd "\$REPO_PATH"
              git fetch origin
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            else
              echo "⚠️  Directory exists but is not a git repository. Removing and re-cloning..."
              rm -rf "\$REPO_PATH"
              git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
              cd "\$REPO_PATH"
              git checkout ${{ github.ref_name }}
            fi
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Seraphim-Systems/git-query.git "\$REPO_PATH"
            cd "\$REPO_PATH"
            git checkout ${{ github.ref_name }}
          fi
          
          echo "✅ Repository ready at \$REPO_PATH"
          ENDSSH

  configure:
    name: Configure Environment
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Environment File
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query
          
          cat > .env << EOF
          DB_MONGODB_USER=${{ secrets.DB_MONGODB_USER }}
          DB_MONGODB_PASSWORD=${{ secrets.DB_MONGODB_PASSWORD }}
          DB_MONGODB_DATABASE=${{ secrets.DB_MONGODB_DATABASE }}
          DB_QDRANT_API_KEY=${{ secrets.DB_QDRANT_API_KEY }}
          SVC_LOG_LEVEL=${{ secrets.SVC_LOG_LEVEL }}
          TRAINING_BATCH_SIZE=${{ github.event.inputs.batch_size || '64' }}
          EPOCHS=${{ github.event.inputs.epochs || '10' }}
          LEARNING_RATE=${{ github.event.inputs.learning_rate || '0.001' }}
          EOF
          
          echo "✅ Environment configured"
          ENDSSH

  train:
    name: Run Training
    runs-on: ubuntu-latest
    needs: configure
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Check Database Dependencies
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          echo "🔍 Checking database dependencies..."
          if ! docker ps | grep -q "git-query-mongodb"; then
            echo "❌ MongoDB is not running. Please deploy infrastructure first."
            exit 1
          fi
          if ! docker ps | grep -q "git-query-qdrant"; then
            echo "❌ Qdrant is not running. Please deploy infrastructure first."
            exit 1
          fi
          
          echo "✅ Database dependencies verified"
          ENDSSH

      - name: Run ML Training
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker
          
          echo "🚀 Starting ML Training..."
          echo "Parameters: Epochs=${{ github.event.inputs.epochs || '10' }}, Batch Size=${{ github.event.inputs.batch_size || '64' }}, LR=${{ github.event.inputs.learning_rate || '0.001' }}"
          
          # Remove old training container if exists
          docker-compose -f docker-compose.base.yml -f docker-compose.training.yml down
          
          # Start training (will run to completion)
          docker-compose -f docker-compose.base.yml -f docker-compose.training.yml up --build
          
          echo "✅ Training job started"
          ENDSSH

  verify:
    name: Verify Training Results
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.INFRA_HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.INFRA_HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Check Training Results
        run: |
          ssh ${{ secrets.INFRA_HETZNER_USER }}@${{ secrets.INFRA_HETZNER_HOST }} << ENDSSH
          set -e
          
          cd /home/${{ secrets.INFRA_HETZNER_USER }}/git-query/infrastructure/docker
          
          echo "🔍 Checking training results..."
          
          # Check exit code
          EXIT_CODE=\$(docker inspect git-query-training --format='{{.State.ExitCode}}' 2>/dev/null || echo "255")
          
          if [ "\$EXIT_CODE" -eq 0 ]; then
            echo "✅ Training completed successfully!"
            docker logs git-query-training --tail 50
          else
            echo "❌ Training failed with exit code: \$EXIT_CODE"
            docker logs git-query-training --tail 100
            exit 1
          fi
          
          echo ""
          echo "✅ Verification complete"
          ENDSSH
