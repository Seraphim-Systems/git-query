name: Deploy Infrastructure (Databases)

# Single Responsibility: Deploy only database services
# Triggered: Manual workflow dispatch
# Services: MongoDB, Redis, Qdrant

on:
  workflow_dispatch:
    inputs:
      services:
        description: 'Which services to deploy'
        required: true
        type: choice
        options:
          - all databases
          - mongodb
          - redis
          - qdrant
        default: 'all databases'

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      compose_files: "-f docker-compose.base.yml -f docker-compose.databases.yml"
      services: ${{ github.event.inputs.services != 'all databases' && github.event.inputs.services || '' }}
      # Qdrant image has no curl/wget. Use docker inspect to wait for the
      # Docker-native HEALTHCHECK (bash /dev/tcp) to report healthy.
      health_check_command: "timeout 60 sh -c 'until docker inspect -f {{.State.Health.Status}} git-query-qdrant 2>/dev/null | grep -qw healthy; do sleep 3; done'"
    secrets: inherit
