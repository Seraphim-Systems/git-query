# This configuration assumes traffic comes through an external NPM instance
# All requests on port 80 will be proxied to the appropriate database service

# API key authentication mapping
map $http_x_api_key $api_key_valid {
    default 0;
    "${DATA_INGESTION_API_KEY}" 1;
}

upstream db_query_api_backend {
    server db-query-api:8080;
}

upstream cosmos_backend {
    server cosmos-db:8081;
}

upstream qdrant_backend {
    server qdrant:6333;
}

upstream redis_backend {
    server redis:6379;
}

server {
    listen 80;
    server_name ${SERVER_NAME};

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health check endpoint
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # MongoDB data ingestion endpoint (via db-query-api HTTP service)
    location /api/ingest/mongodb {
        proxy_pass http://db_query_api_backend/api/mongodb/insert;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $http_x_api_key;
        
        # API connection timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Limit request size for data ingestion (adjust as needed)
        client_max_body_size 100M;
    }

    # Cosmos DB data ingestion endpoint
    location /api/ingest/cosmos {
        if ($api_key_valid = 0) {
            return 401 "Unauthorized";
        }

        proxy_pass https://cosmos_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSL settings for Cosmos emulator
        proxy_ssl_verify off;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        client_max_body_size 100M;
    }

    # Qdrant vector database endpoint
    location /api/ingest/qdrant/ {
        if ($api_key_valid = 0) {
            return 401 "Unauthorized";
        }

        proxy_pass http://qdrant_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        client_max_body_size 500M;
    }

    # Redis cache endpoint (for session data, etc.)
    location /api/ingest/redis {
        if ($api_key_valid = 0) {
            return 401 "Unauthorized";
        }

        # Redis uses RESP protocol, not HTTP
        # This endpoint would require a custom proxy or lua script
        # For now, return a helpful message
        return 501 "Redis ingestion requires direct connection. Use redis-cli or Python redis library.";
    }

    # Database status endpoint
    location /api/status {
        if ($api_key_valid = 0) {
            return 401 "Unauthorized";
        }

        default_type application/json;
        return 200 '{"mongodb":"available","cosmos":"available","qdrant":"available","redis":"available","status":"healthy"}';
    }

    # Documentation endpoint
    location /api/docs {
        alias /usr/share/nginx/html;
        index ingestion-docs.html;
    }

    # Default location
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}