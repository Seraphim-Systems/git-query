server {
    listen 80;
    server_name ${SERVER_NAME};

    # Increase body size for data ingestion
    client_max_body_size 50M;
    
    # Database Query API - proxied to FastAPI service with API key authentication
    location /api/ {
        # Validate API key
        if ($http_x_api_key != "${DATA_INGESTION_API_KEY}") {
            return 401 '{"error": "Unauthorized - Invalid or missing API key"}';
        }
        
        proxy_pass http://db-query-api:8080/api/;
        proxy_http_version 1.1;
        
        # Pass client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pass API key header to backend
        proxy_set_header X-API-Key $http_x_api_key;
        
        # Timeouts for long-running queries
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }
    
    # FastAPI automatic documentation - no auth required
    location /docs {
        proxy_pass http://db-query-api:8080/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /openapi.json {
        proxy_pass http://db-query-api:8080/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /redoc {
        proxy_pass http://db-query-api:8080/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check endpoint - no auth required
    location /health {
        proxy_pass http://db-query-api:8080/health;
        access_log off;
    }

    # Serve static files (fallback)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
