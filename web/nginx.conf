server {
    listen 80;
    server_name ${SERVER_NAME};

    # Increase body size for data ingestion
    client_max_body_size 100M;
    
    # Database API routes - /api/db/<service> proxied to db-query-api
    # API key authentication is handled by the FastAPI application
    location /api/db/ {
        proxy_pass http://db-query-api:8080/api/v1/;
        proxy_http_version 1.1;
        
        # Pass client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pass Authorization header to backend for API key validation
        proxy_set_header Authorization $http_authorization;
        
        # Timeouts for long-running queries and bulk operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # CORS headers (if needed)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # FastAPI automatic documentation - no auth required
    location /docs {
        proxy_pass http://db-query-api:8080/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /openapi.json {
        proxy_pass http://db-query-api:8080/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    location /redoc {
        proxy_pass http://db-query-api:8080/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health check endpoint - no auth required
    location /health {
        proxy_pass http://db-query-api:8080/health;
        access_log off;
    }

    # Serve static web application (fallback)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        add_header Cache-Control "public, max-age=3600";
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
