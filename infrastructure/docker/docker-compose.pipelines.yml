version: '3.8'

# Data Pipelines - Scraper and Processing
# Usage: docker-compose -f docker-compose.base.yml -f docker-compose.pipelines.yml up

services:
  scraper:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.scraper
    container_name: git-query-scraper
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SCRAPE_INTERVAL=${SCRAPE_INTERVAL:-3600}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-5}
    depends_on:
      - mongodb
      - redis
    networks:
      - db-network
    restart: unless-stopped
    volumes:
      - scraper-data:/app/data

  processing:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.processing
    container_name: git-query-processing
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BATCH_SIZE=${BATCH_SIZE:-100}
    depends_on:
      - mongodb
      - qdrant
      - redis
    networks:
      - db-network
    restart: unless-stopped
    volumes:
      - processing-data:/app/data

volumes:
  scraper-data:
    name: git-query-scraper-data
  processing-data:
    name: git-query-processing-data

networks:
  db-network:
    external: true
    name: git-query-db-network
