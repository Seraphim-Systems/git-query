# MCP (Model Context Protocol) Servers
# Usage: docker-compose -f docker-compose.base.yml -f docker-compose.mcp.yml up

services:
  mcp-server:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mcp
    container_name: git-query-mcp
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8090
      - LOG_LEVEL=${SVC_LOG_LEVEL:-INFO}
      - MONGODB_URL=mongodb://${DB_MONGODB_USER:-admin}:${DB_MONGODB_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${DB_QDRANT_API_KEY:-}
      - REDIS_URL=redis://:${DB_REDIS_PASSWORD:-redispass}@redis:6379
      - MCP_API_KEY=${APIKEY_MCP}
      - OPENAI_API_KEY=${APP_OPENAI_API_KEY}
    depends_on:
      - mongodb
      - qdrant
      - redis
    networks:
      - db-network
      - web-network
    restart: unless-stopped
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  db-network:
    name: git-query-db-network
  web-network:
    name: git-query-web-network
