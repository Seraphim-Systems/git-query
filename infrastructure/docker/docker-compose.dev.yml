# Development override - exposes ports to host for debugging

services:
  mongodb:
    ports:
      - "27017:27017"
  # cosmos-db removed from development override

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"
  redis:
    ports:
      - "6379:6379"

  recommender:
    ports:
      - "8095:8095"
    environment:
      LOG_LEVEL: DEBUG
      SVC_NGINX_SERVER_NAME: ""

  mcp-server:
      ports:
        - "8090:8090"
      environment:
        LOG_LEVEL: DEBUG
        MONGODB_URL: "mongodb://${DB_MONGODB_USER:-admin}:${DB_MONGODB_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin"
        REDIS_URL: "redis://:${DB_REDIS_PASSWORD:-redispass}@redis:6379"
        QDRANT_HOST: "${QDRANT_HOST:-qdrant}"
        QDRANT_PORT: "${QDRANT_HTTP_PORT:-6333}"
        QDRANT_API_KEY: "${DB_QDRANT_API_KEY:-}"
        MCP_API_KEY: "${APIKEY_MCP}"
        OPENAI_API_KEY: "${APP_OPENAI_API_KEY}"
        RECOMMENDER_URL: "http://recommender:8095"

  gateway:
      ports:
        - "80:80"
      environment:
        LOG_LEVEL: DEBUG

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "8080:8080"
    environment:
      LOG_LEVEL: DEBUG
    # Note: db-query-api removed in favor of running the API Gateway which now
    # serves DB endpoints. The `gateway` service will bind host port 80 in dev.
