# Development override - exposes ports to host for debugging
name: git-query

services:
  mongodb:
    ports:
      - "27017:27017"

  cosmos-db:
    ports:
      - "8081:8081"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    ports:
      - "6379:6379"

  mcp-server:
    ports:
      - "8090:8090"
    environment:
      - LOG_LEVEL=DEBUG

  gateway:
    ports:
      - "80:80"
    environment:
      - LOG_LEVEL=DEBUG
  # Note: db-query-api removed in favor of running the API Gateway which now
  # serves DB endpoints. The `gateway` service will bind host port 80 in dev.
