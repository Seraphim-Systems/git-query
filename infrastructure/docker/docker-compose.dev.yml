# Development override - exposes ports to host for debugging
name: git-query

services:
  mongodb:
    ports:
      - "27017:27017"

  cosmos-db:
    ports:
      - "8081:8081"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    ports:
      - "6379:6379"

  mcp-server:
    ports:
      - "8090:8090"
    environment:
      - LOG_LEVEL=DEBUG

  nginx:
    ports:
      - "80:80"

  db-query-api:
    ports:
      - "8080:8080"
    environment:
      # Use host env if set, otherwise fall back to a local dev key
      - DATA_INGESTION_API_KEY=${DATA_INGESTION_API_KEY:-dev-local-key}
