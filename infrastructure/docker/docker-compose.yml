name: git-query

services:
  # Database Services
  mongodb:
    image: mongo:7.0
    container_name: git-query-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-gitquery}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - ../../src/storage/mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - git-query-db-network
    restart: unless-stopped
    command: mongod --auth

  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: git-query-cosmos-db
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: ${COSMOS_PARTITION_COUNT:-10}
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: 'true'
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: 0.0.0.0
    volumes:
      - cosmos-data:/data/db
      - ../../src/storage/cosmos/cosmos-init.js:/docker-entrypoint-initdb.d/cosmos-init.js:ro
    networks:
      - git-query-db-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: git-query-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
    volumes:
      - qdrant-storage:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - git-query-db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  qdrant-init:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.qdrant-init
    container_name: git-query-qdrant-init
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    networks:
      - git-query-db-network
    restart: 'no'

  redis:
    image: redis:7-alpine
    container_name: git-query-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis-data:/data
    networks:
      - git-query-db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway - Handles auth, sessions, and routing
  api-gateway:
    image: git-query-api-gateway:${GATEWAY_VERSION:-latest}
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.gateway
    container_name: git-query-api-gateway
    expose:
      - "8000"
    environment:
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - MCP_SERVER_URL=http://mcp-server:8001
      - RECOMMENDER_URL=http://recommender-api:8002
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      - mongodb
      - redis
      - mcp-server
    networks:
      - git-query-app-network
      - git-query-db-network
    restart: unless-stopped

  # MCP Server - Internal tools service (not exposed directly)
  mcp-server:
    image: git-query-mcp-server:${MCP_VERSION:-latest}
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mcp
    container_name: git-query-mcp-server
    expose:
      - "8001"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - git-query-app-network
      - git-query-db-network
    restart: unless-stopped

  # ChatbotClient - Pydantic AI powered chatbot
  chatbot-client:
    image: git-query-chatbot-client:${CHATBOT_CLIENT_VERSION:-latest}
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.chatbot-client
    container_name: git-query-chatbot-client
    stdin_open: true
    tty: true
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000
      - LOG_LEVEL=INFO
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      - mcp-server
      - mongodb
      - redis
    networks:
      - git-query-app-network
      - git-query-db-network

  # Nginx (reverse proxy and static files)
  nginx:
    image: git-query-nginx:${NGINX_VERSION:-latest}
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: git-query-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - api-gateway
    networks:
      - git-query-app-network
    restart: unless-stopped

volumes:
  mongodb-data:
    name: git-query-mongodb-data
  mongodb-config:
    name: git-query-mongodb-config
  cosmos-data:
    name: git-query-cosmos-data
  qdrant-storage:
    name: git-query-qdrant-storage
  qdrant-snapshots:
    name: git-query-qdrant-snapshots
  redis-data:
    name: git-query-redis-data

networks:
  git-query-app-network:
    name: git-query-app-network
    driver: bridge
  
  git-query-db-network:
    name: git-query-db-network
    driver: bridge
