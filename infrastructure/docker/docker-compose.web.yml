# Web UI service
# Usage: Use with -f docker-compose.base.yml -f docker-compose.web.yml

services:
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: git-query-web
    image: git-query-web:latest
    environment:
      WEBSERVER_HOST: 0.0.0.0
      WEBSERVER_PORT: 8080
      LOG_LEVEL: ${SVC_LOG_LEVEL:-INFO}
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:80}
      MONGODB_URL: mongodb://${DB_MONGODB_USER:-admin}:${DB_MONGODB_PASSWORD:-mongopass}@mongodb:27017/${DB_MONGODB_DATABASE:-gitquery}?authSource=admin
      REDIS_URL: redis://:${DB_REDIS_PASSWORD:-redispass}@redis:6379
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_HTTP_PORT:-6333}
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal-network
