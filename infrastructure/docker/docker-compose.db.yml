version: '3.8'

services:
  # Database Services
  mongodb:
    image: mongo:7.0
    container_name: git-query-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-gitquery}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - ../../src/storage/mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - db-network
    restart: unless-stopped
    command: mongod --auth
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cosmos-db:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: git-query-cosmos-db
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: ${COSMOS_PARTITION_COUNT:-10}
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: 'true'
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: 0.0.0.0
    volumes:
      - cosmos-data:/data/db
    networks:
      - db-network
    restart: unless-stopped
    expose:
      - "8081"
      - "10250"
      - "10251"
      - "10252"
      - "10253"
      - "10254"

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: git-query-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: ${QDRANT_LOG_LEVEL:-INFO}
    volumes:
      - qdrant-storage:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - db-network
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"

  qdrant-init:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.qdrant-init
    container_name: git-query-qdrant-init
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    networks:
      - db-network
    restart: 'no'

  redis:
    image: redis:7-alpine
    container_name: git-query-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis-data:/data
    networks:
      - db-network
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # Database Query API
  db-query-api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.db-api
    container_name: git-query-db-api
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - COSMOS_DB_URL=https://cosmos-db:8081
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      - DATA_INGESTION_API_KEY=${DATA_INGESTION_API_KEY}
    depends_on:
      - mongodb
      - redis
      - qdrant
    networks:
      - db-network
      - web-network
    restart: unless-stopped
    expose:
      - "8080"

  # Nginx proxy for database queries
  nginx:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web-db
    container_name: git-query-nginx
    environment:
      - SERVER_NAME=${SERVER_NAME:-_}
      - DATA_INGESTION_API_KEY=${DATA_INGESTION_API_KEY}
    expose:
      - "80"
    depends_on:
      - db-query-api
    networks:
      - web-network
    restart: unless-stopped

volumes:
  mongodb-data:
    name: git-query-mongodb-data
  mongodb-config:
    name: git-query-mongodb-config
  cosmos-data:
    name: git-query-cosmos-data
  qdrant-storage:
    name: git-query-qdrant-storage
  qdrant-snapshots:
    name: git-query-qdrant-snapshots
  redis-data:
    name: git-query-redis-data

networks:
  db-network:
    name: git-query-db-network
    driver: bridge
  web-network:
    name: git-query-web-network
    driver: bridge