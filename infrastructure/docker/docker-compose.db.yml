
services:
  # Database Services
  mongodb:
    image: mongo:7.0
    container_name: git-query-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_MONGODB_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: ${DB_MONGODB_DATABASE:-gitquery}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - ../../src/db/inits/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - db-network
    restart: unless-stopped
    command: mongod --auth
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      # Reduce frequency to lower connection churn during local development
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # cosmos-db service removed

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: git-query-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: ${SVC_QDRANT_LOG_LEVEL:-INFO}
    volumes:
      - qdrant-storage:/qdrant/storage
      - qdrant-snapshots:/qdrant/snapshots
    networks:
      - db-network
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"

  qdrant-init:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.qdrant-init
    container_name: git-query-qdrant-init
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    networks:
      - db-network
    restart: 'no'

  redis:
    image: redis:7-alpine
    container_name: git-query-redis
    command: redis-server --requirepass ${DB_REDIS_PASSWORD:-redispass}
    volumes:
      - redis-data:/data
    networks:
      - db-network
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      # Poll less frequently to reduce short-lived connections
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
  # Note: db-query-api removed. Database endpoints are served by the API Gateway.

  # API Gateway - serves API and database routers; listens on port 80
  gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.gateway
    # Use fixed project name for image and container (no COMPOSE_PROJECT_NAME)
    image: git-query-gateway:latest
    container_name: git-query-gateway
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${SVC_LOG_LEVEL:-INFO}
      # Provide database connection URLs using the DB_* secrets defined for services
      - REDIS_URL=redis://:${DB_REDIS_PASSWORD:-redispass}@redis:6379
      - MONGODB_URL=mongodb://${DB_MONGODB_USER:-admin}:${DB_MONGODB_PASSWORD:-mongopass}@mongodb:27017/${DB_MONGODB_DATABASE:-gitquery}?authSource=admin
      # Ensure gateway resolves Qdrant to the qdrant service on the
      # compose network instead of localhost so the Qdrant client can
      # successfully connect at startup.
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_HTTP_PORT=${QDRANT_HTTP_PORT:-6333}
      # Backend service URLs for chat and recommendations
      - MCP_SERVER_URL=http://mcp-server:8090
      - RECOMMENDER_URL=http://recommender:8095
      # Cosmos DB removed
    expose:
      - "80"
    depends_on:
      - mongodb
      - redis
      - qdrant
      - qdrant-init
    networks:
      - db-network
      - web-network
      - proxy
    restart: unless-stopped

volumes:
  mongodb-data:
    name: git-query-mongodb-data
  mongodb-config:
    name: git-query-mongodb-config
  qdrant-storage:
    name: git-query-qdrant-storage
  qdrant-snapshots:
    name: git-query-qdrant-snapshots
  redis-data:
    name: git-query-redis-data

networks:
  db-network:
    driver: bridge
  web-network:
    driver: bridge
  proxy:
    external: true
    name: proxy
