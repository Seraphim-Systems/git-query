# Production overrides - no host port binding, persistent volumes, production logging
# Services communicate only via internal Docker networks
# Usage: docker-compose -f docker-compose.base.yml -f docker-compose.databases.yml -f docker-compose.app.yml -f docker-compose.prod.yml up

networks:
  proxy:
    external: true
    name: proxy

services:
  mongodb:
    ports: []
    volumes:
      - ../../volumes/mongodb/data:/data/db
      - ../../volumes/mongodb/config:/data/configdb
      - ../../src/db/inits/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      LOG_LEVEL: INFO

  redis:
    ports: []
    volumes:
      - ../../volumes/redis/data:/data
    environment:
      LOG_LEVEL: INFO

  qdrant:
    ports: []
    volumes:
      - ../../volumes/qdrant/storage:/qdrant/storage
      - ../../volumes/qdrant/snapshots:/qdrant/snapshots
    environment:
      LOG_LEVEL: INFO

  gateway:
    ports: []
    expose:
      - "80"
    networks:
      - internal-network
      - proxy
    environment:
      LOG_LEVEL: INFO

  recommender:
    ports: []
    environment:
      LOG_LEVEL: INFO

  mcp-server:
    ports: []
    environment:
      LOG_LEVEL: INFO

  web:
    ports: []
    networks:
      - internal-network
      - proxy

  training:
    volumes:
      - ../../volumes/training/models:/app/models
      - ../../volumes/training/data:/app/training_data
      - ../../volumes/training/logs:/app/logs
