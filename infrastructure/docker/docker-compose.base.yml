# Base compose file - defines shared networks and volumes
# Does not deploy any containers - use with individual service compose files
# Usage: docker-compose -f docker-compose.base.yml -f docker-compose.mongodb.yml up
services: {}

volumes:
  mongodb-data:
    name: git-query-mongodb-data
  mongodb-config:
    name: git-query-mongodb-config
  qdrant-storage:
    name: git-query-qdrant-storage
  qdrant-snapshots:
    name: git-query-qdrant-snapshots
  redis-data:
    name: git-query-redis-data
  scraper-data:
    name: git-query-scraper-data
  processing-data:
    name: git-query-processing-data
  model-artifacts:
    name: git-query-model-artifacts
  training-data:
    name: git-query-training-data
  training-logs:
    name: git-query-training-logs
  huggingface-cache:
    name: git-query-huggingface-cache

networks:
  db-network:
    name: git-query-db-network
    driver: bridge
  web-network:
    name: git-query-web-network
    driver: bridge
