# MLflow Tracking Server Compose Configuration
# Provides experiment tracking, model registry, and artifact storage

services:
  mlflow:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mlflow
    image: git-query-mlflow:latest
    container_name: git-query-mlflow
    expose:
      - "5000"
    volumes:
      # Persistent storage for experiments and artifacts
      - mlflow-runs:/mlflow
      - mlflow-artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI:-sqlite:////mlflow/mlflow.db}
      --default-artifact-root ${MLFLOW_DEFAULT_ARTIFACT_ROOT:-/mlflow/artifacts}
      --host 0.0.0.0
      --port 5000
    environment:
      - MLFLOW_BACKEND_STORE_URI=${MLFLOW_BACKEND_STORE_URI:-sqlite:////mlflow/mlflow.db}
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=${MLFLOW_DEFAULT_ARTIFACT_ROOT:-/mlflow/artifacts}
    networks:
      - internal-network
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/2.0/mlflow/experiments/list').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mlflow-runs:
    name: git-query-mlflow-runs
  mlflow-artifacts:
    name: git-query-mlflow-artifacts

networks:
  internal-network:
    external: true
    name: git-query-internal-network
  proxy:
    external: true
    name: proxy
