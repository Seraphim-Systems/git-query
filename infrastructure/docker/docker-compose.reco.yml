# Recommender service compose
# Usage: docker-compose -f docker-compose.base.yml -f docker-compose.reco.yml up

services:
  recommender:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.recommender
    container_name: git-query-recommender
    environment:
      - RECOMMENDER_HOST=0.0.0.0
      - RECOMMENDER_PORT=8095
      - LOG_LEVEL=${SVC_LOG_LEVEL:-INFO}
      - MONGODB_URL=mongodb://${DB_MONGODB_USER:-admin}:${DB_MONGODB_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${DB_QDRANT_API_KEY:-}
      - REDIS_URL=redis://:${DB_REDIS_PASSWORD:-redispass}@redis:6379
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
    networks:
      - db-network
      - web-network
    restart: unless-stopped
    expose:
      - "8095"
    volumes:
      - model-artifacts:/app/models
      - huggingface-cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  db-network:
    name: git-query-db-network
  web-network:
    name: git-query-web-network
