version: '3.8'

# Recommendation Engine (Serving)
# Usage: docker-compose -f docker-compose.base.yml -f docker-compose.reco.yml up

services:
  recommender:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.recommender
    container_name: git-query-recommender
    environment:
      - RECOMMENDER_HOST=0.0.0.0
      - RECOMMENDER_PORT=8095
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MODEL_PATH=/app/models
      - MONGODB_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/gitquery?authSource=admin
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      - INFERENCE_BATCH_SIZE=${INFERENCE_BATCH_SIZE:-32}
    depends_on:
      - mongodb
      - qdrant
      - redis
    networks:
      - db-network
      - web-network
    restart: unless-stopped
    expose:
      - "8095"
    volumes:
      - recommender-models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  recommender-models:
    name: git-query-recommender-models

networks:
  db-network:
    external: true
    name: git-query-db-network
  web-network:
    external: true
    name: git-query-web-network
