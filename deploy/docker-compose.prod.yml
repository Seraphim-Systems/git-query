# Production override - no exposed ports, internal communication only
# Secrets pulled from GitHub Secrets via environment variables
services:
  nginx:
    # Only expose nginx in production (via load balancer or ingress)
    # Uncomment if you need direct access, otherwise use external LB
    # ports:
    #   - "80:80"
    environment:
      - ENVIRONMENT=production
    restart: always

  app:
    environment:
      - CHAT_AGENT_URL=http://chat-agent:8001
      - RECOMMENDER_URL=http://recommender:8002
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
    restart: always

  chat-agent:
    environment:
      - RECOMMENDER_TOOL_URL=http://recommender:8002
      - MODEL_PATH=/models/chat_model
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - API_SECRET=${API_SECRET}
    restart: always

  recommender:
    environment:
      - MODEL_PATH=/models/recommender_model
      - DATABASE_URL=${DATABASE_URL}
      - API_SECRET=${API_SECRET}
    restart: always

  mcp-server:
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    restart: always

  chatbot-client:
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_NAME=${CHATBOT_MODEL_NAME:-gpt-4}
    restart: always

  db:
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    restart: always
