services:
  # Application API Gateway
  app:
    image: git-query-app:${APP_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    container_name: git-query-app
    environment:
      - CHAT_AGENT_URL=http://chat-agent:8001
      - RECOMMENDER_URL=http://recommender:8002
      - DATABASE_URL=postgresql://user:pass@gitquery-postgres:5432/gitquery
      - MONGODB_URL=mongodb://admin:mongopass@gitquery-mongodb:27017/gitquery?authSource=admin
      - COSMOS_DB_URL=https://gitquery-cosmos-db:8081
      - COSMOS_DB_KEY=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - QDRANT_URL=http://gitquery-qdrant:6333
      - REDIS_URL=redis://gitquery-redis:6379
    depends_on:
      - chat-agent
      - recommender
    networks:
      - app-network
      - gitquery-db-network
    restart: unless-stopped

  # Chat Agent MCP Server
  chat-agent:
    image: git-query-chat-agent:${CHAT_AGENT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.chat-agent
    container_name: git-query-chat-agent
    environment:
      - RECOMMENDER_TOOL_URL=http://recommender:8002
      - MODEL_PATH=/models/chat_model
      - MONGODB_URL=mongodb://admin:mongopass@gitquery-mongodb:27017/gitquery?authSource=admin
      - REDIS_URL=redis://gitquery-redis:6379
    volumes:
      - ../models/chat_model:/models/chat_model:ro
    networks:
      - app-network
      - gitquery-db-network
    restart: unless-stopped

  # Recommender MCP Tool Server
  recommender:
    image: git-query-recommender:${RECOMMENDER_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.recommender
    container_name: git-query-recommender
    environment:
      - MODEL_PATH=/models/recommender_model
      - DATABASE_URL=postgresql://user:pass@gitquery-postgres:5432/gitquery
      - MONGODB_URL=mongodb://admin:mongopass@gitquery-mongodb:27017/gitquery?authSource=admin
      - COSMOS_DB_URL=https://gitquery-cosmos-db:8081
      - COSMOS_DB_KEY=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - QDRANT_URL=http://gitquery-qdrant:6333
      - REDIS_URL=redis://gitquery-redis:6379
    volumes:
      - ../models/recommender_model:/models/recommender_model:ro
    networks:
      - app-network
      - gitquery-db-network
    restart: unless-stopped

  # MCP Server - Generic tools host
  mcp-server:
    image: git-query-mcp-server:${MCP_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    container_name: git-query-mcp-server
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://user:pass@gitquery-postgres:5432/gitquery
      - MONGODB_URL=mongodb://admin:mongopass@gitquery-mongodb:27017/gitquery?authSource=admin
      - REDIS_URL=redis://gitquery-redis:6379
    networks:
      - app-network
      - gitquery-db-network
    restart: unless-stopped

  # ChatbotClient - Pydantic AI powered chatbot
  chatbot-client:
    image: git-query-chatbot-client:${CHATBOT_CLIENT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.chatbot-client
    container_name: git-query-chatbot-client
    stdin_open: true
    tty: true
    environment:
      - MCP_SERVER_URL=http://mcp-server:8000
      - LOG_LEVEL=INFO
      - MONGODB_URL=mongodb://admin:mongopass@gitquery-mongodb:27017/gitquery?authSource=admin
      - REDIS_URL=redis://gitquery-redis:6379
    depends_on:
      - mcp-server
    networks:
      - app-network
      - gitquery-db-network

  # Nginx (reverse proxy and static files)
  nginx:
    image: git-query-nginx:${NGINX_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: git-query-nginx
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

volumes:
  # Application volumes only - database volumes managed in ../DB/

networks:
  app-network:
    driver: bridge
  
  gitquery-db-network:
    external: true
    name: gitquery-db-network
