services:
  # Application API Gateway
  app:
    image: git-query-app:${APP_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    container_name: git-query-app
    environment:
      - CHAT_AGENT_URL=http://chat-agent:8001
      - RECOMMENDER_URL=http://recommender:8002
      - DATABASE_URL=postgresql://user:pass@db:5432/gitquery
    depends_on:
      - chat-agent
      - recommender
      - db
    networks:
      - app-network
    restart: unless-stopped

  # Chat Agent MCP Server
  chat-agent:
    image: git-query-chat-agent:${CHAT_AGENT_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.chat-agent
    container_name: git-query-chat-agent
    environment:
      - RECOMMENDER_TOOL_URL=http://recommender:8002
      - MODEL_PATH=/models/chat_model
    volumes:
      - ../models/chat_model:/models/chat_model:ro
    networks:
      - app-network
    restart: unless-stopped

  # Recommender MCP Tool Server
  recommender:
    image: git-query-recommender:${RECOMMENDER_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.recommender
    container_name: git-query-recommender
    environment:
      - MODEL_PATH=/models/recommender_model
      - DATABASE_URL=postgresql://user:pass@db:5432/gitquery
    volumes:
      - ../models/recommender_model:/models/recommender_model:ro
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  # Nginx (reverse proxy and static files)
  nginx:
    image: git-query-nginx:${NGINX_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: git-query-nginx
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: git-query-db:${DB_VERSION:-latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile.db
    container_name: git-query-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=gitquery
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
